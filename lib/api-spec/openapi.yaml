openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Al-Muhandis Islamic Intelligence Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: quran
    description: Quran operations
  - name: hadith
    description: Hadith operations
  - name: search
    description: Search operations
  - name: bookmarks
    description: Bookmark operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /quran/summary:
    get:
      operationId: getQuranSummary
      tags: [quran]
      summary: Get Quran dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuranSummary"

  /quran/daily-ayah:
    get:
      operationId: getDailyAyah
      tags: [quran]
      summary: Get the daily featured ayah
      responses:
        "200":
          description: Daily ayah
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ayah"

  /quran/surahs:
    get:
      operationId: listSurahs
      tags: [quran]
      summary: List all Surahs
      responses:
        "200":
          description: List of surahs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Surah"

  /quran/surahs/{surahId}:
    get:
      operationId: getSurah
      tags: [quran]
      summary: Get a specific Surah
      parameters:
        - name: surahId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Surah details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Surah"

  /quran/surahs/{surahId}/ayahs:
    get:
      operationId: listAyahs
      tags: [quran]
      summary: Get all ayahs for a surah
      parameters:
        - name: surahId
          in: path
          required: true
          schema:
            type: integer
        - name: translationId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of ayahs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ayah"

  /quran/ayahs/{ayahId}:
    get:
      operationId: getAyah
      tags: [quran]
      summary: Get a specific ayah
      parameters:
        - name: ayahId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ayah details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ayah"

  /quran/ayahs/{ayahId}/words:
    get:
      operationId: getAyahWords
      tags: [quran]
      summary: Get word-by-word analysis for an ayah
      parameters:
        - name: ayahId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Word analysis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AyahWord"

  /quran/ayahs/{ayahId}/tafseer:
    get:
      operationId: getAyahTafseer
      tags: [quran]
      summary: Get tafseer for an ayah
      parameters:
        - name: ayahId
          in: path
          required: true
          schema:
            type: integer
        - name: source
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Tafseer content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tafseer"

  /quran/ayahs/{ayahId}/related-hadiths:
    get:
      operationId: getAyahRelatedHadiths
      tags: [quran]
      summary: Get hadiths related to an ayah
      parameters:
        - name: ayahId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Related hadiths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hadith"

  /quran/translations:
    get:
      operationId: listTranslations
      tags: [quran]
      summary: List available translations
      responses:
        "200":
          description: Translations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Translation"

  /quran/reciters:
    get:
      operationId: listReciters
      tags: [quran]
      summary: List available reciters
      responses:
        "200":
          description: Reciters list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reciter"

  /hadith/summary:
    get:
      operationId: getHadithSummary
      tags: [hadith]
      summary: Get hadith ecosystem summary stats
      responses:
        "200":
          description: Hadith summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HadithSummary"

  /hadith/collections:
    get:
      operationId: listHadithCollections
      tags: [hadith]
      summary: List all Hadith collections
      responses:
        "200":
          description: Collections list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HadithCollection"

  /hadith/collections/{collectionId}/hadiths:
    get:
      operationId: listHadiths
      tags: [hadith]
      summary: List hadiths in a collection
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Hadiths list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HadithListResponse"

  /hadith/{hadithId}:
    get:
      operationId: getHadith
      tags: [hadith]
      summary: Get a specific hadith with full details
      parameters:
        - name: hadithId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hadith details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HadithDetail"

  /hadith/{hadithId}/isnad:
    get:
      operationId: getHadithIsnad
      tags: [hadith]
      summary: Get isnad chain for a hadith
      parameters:
        - name: hadithId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Isnad chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IsnadChain"

  /hadith/{hadithId}/related-ayahs:
    get:
      operationId: getHadithRelatedAyahs
      tags: [hadith]
      summary: Get Quranic ayahs related to a hadith
      parameters:
        - name: hadithId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Related ayahs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ayah"

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Unified search across Quran and Hadith
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [all, quran, hadith]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /bookmarks:
    get:
      operationId: listBookmarks
      tags: [bookmarks]
      summary: Get all bookmarks
      responses:
        "200":
          description: Bookmarks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bookmark"
    post:
      operationId: createBookmark
      tags: [bookmarks]
      summary: Create a bookmark
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookmarkBody"
      responses:
        "201":
          description: Created bookmark
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bookmark"

  /bookmarks/{bookmarkId}:
    delete:
      operationId: deleteBookmark
      tags: [bookmarks]
      summary: Delete a bookmark
      parameters:
        - name: bookmarkId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    QuranSummary:
      type: object
      properties:
        totalSurahs:
          type: integer
        totalAyahs:
          type: integer
        totalWords:
          type: integer
        makkiSurahs:
          type: integer
        madaniSurahs:
          type: integer
        lastRead:
          type: object
          nullable: true
          properties:
            surahId:
              type: integer
            surahName:
              type: string
            ayahNumber:
              type: integer
      required: [totalSurahs, totalAyahs, totalWords, makkiSurahs, madaniSurahs]

    Surah:
      type: object
      properties:
        id:
          type: integer
        number:
          type: integer
        nameArabic:
          type: string
        nameTransliterated:
          type: string
        nameEnglish:
          type: string
        revelation:
          type: string
          enum: [Meccan, Medinan]
        ayahCount:
          type: integer
        juzNumber:
          type: integer
        description:
          type: string
      required: [id, number, nameArabic, nameTransliterated, nameEnglish, revelation, ayahCount, juzNumber]

    Ayah:
      type: object
      properties:
        id:
          type: integer
        surahId:
          type: integer
        surahName:
          type: string
        ayahNumber:
          type: integer
        arabicText:
          type: string
        translation:
          type: string
        transliteration:
          type: string
        juzNumber:
          type: integer
        pageNumber:
          type: integer
        audioUrl:
          type: string
          nullable: true
      required: [id, surahId, surahName, ayahNumber, arabicText, translation, transliteration, juzNumber, pageNumber]

    AyahWord:
      type: object
      properties:
        id:
          type: integer
        ayahId:
          type: integer
        position:
          type: integer
        arabicText:
          type: string
        transliteration:
          type: string
        translation:
          type: string
        rootWord:
          type: string
        grammar:
          type: string
      required: [id, ayahId, position, arabicText, transliteration, translation, rootWord, grammar]

    Tafseer:
      type: object
      properties:
        ayahId:
          type: integer
        source:
          type: string
        arabicText:
          type: string
        englishText:
          type: string
        scholarName:
          type: string
      required: [ayahId, source, arabicText, englishText, scholarName]

    Translation:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        language:
          type: string
        author:
          type: string
      required: [id, name, language, author]

    Reciter:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        style:
          type: string
        language:
          type: string
      required: [id, name, style, language]

    HadithSummary:
      type: object
      properties:
        totalCollections:
          type: integer
        totalHadiths:
          type: integer
        totalNarrators:
          type: integer
        gradeBreakdown:
          type: object
          properties:
            sahih:
              type: integer
            hasan:
              type: integer
            daif:
              type: integer
            munkar:
              type: integer
            mawdu:
              type: integer
            unknown:
              type: integer
          required: [sahih, hasan, daif]
      required: [totalCollections, totalHadiths, totalNarrators, gradeBreakdown]

    HadithCollection:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nameArabic:
          type: string
        author:
          type: string
        totalHadiths:
          type: integer
        description:
          type: string
        era:
          type: string
      required: [id, name, nameArabic, author, totalHadiths, description, era]

    Hadith:
      type: object
      properties:
        id:
          type: integer
        collectionId:
          type: string
        collectionName:
          type: string
        hadithNumber:
          type: string
        arabicText:
          type: string
        translation:
          type: string
        grade:
          type: string
          enum: [Sahih, Hasan, Da'if, Mawdu', Unknown]
        gradeReason:
          type: string
        narrator:
          type: string
        topics:
          type: array
          items:
            type: string
      required: [id, collectionId, collectionName, hadithNumber, arabicText, translation, grade, narrator, topics]

    HadithDetail:
      allOf:
        - $ref: "#/components/schemas/Hadith"
        - type: object
          properties:
            sharh:
              type: string
            isnadChain:
              $ref: "#/components/schemas/IsnadChain"
          required: []

    HadithListResponse:
      type: object
      properties:
        hadiths:
          type: array
          items:
            $ref: "#/components/schemas/Hadith"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [hadiths, total, page, limit]

    IsnadChain:
      type: object
      properties:
        hadithId:
          type: integer
        narrators:
          type: array
          items:
            $ref: "#/components/schemas/Narrator"
        overallGrade:
          type: string
      required: [hadithId, narrators, overallGrade]

    Narrator:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameArabic:
          type: string
        birthYear:
          type: integer
          nullable: true
        deathYear:
          type: integer
          nullable: true
        location:
          type: string
        reliability:
          type: string
        grade:
          type: string
        heardFrom:
          type: array
          items:
            type: string
        position:
          type: integer
      required: [id, name, nameArabic, reliability, grade, heardFrom, position]

    SearchResults:
      type: object
      properties:
        query:
          type: string
        ayahs:
          type: array
          items:
            $ref: "#/components/schemas/Ayah"
        hadiths:
          type: array
          items:
            $ref: "#/components/schemas/Hadith"
        total:
          type: integer
      required: [query, ayahs, hadiths, total]

    Bookmark:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [ayah, hadith]
        referenceId:
          type: integer
        title:
          type: string
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, type, referenceId, title, createdAt]

    CreateBookmarkBody:
      type: object
      properties:
        type:
          type: string
          enum: [ayah, hadith]
        referenceId:
          type: integer
        title:
          type: string
        note:
          type: string
          nullable: true
      required: [type, referenceId, title]
